<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuk & Ches's Home</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;font-family:"PingFang SC","Microsoft YaHei",sans-serif;height:100vh;display:flex;flex-direction:column;color:#e0e0e0}
.header{background:#1a1a2e;padding:16px;text-align:center;border-bottom:1px solid #2a2a3e}
.header h1{font-size:14px;font-weight:400;color:#c8c8c8;letter-spacing:2px}
.header .status{font-size:11px;color:#4a6741;margin-top:4px}
.chat-box{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:75%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.6;animation:fadeIn .3s ease}
.msg.user{align-self:flex-end;background:#2a3a2a;color:#b8c8b8;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:#1e1e2e;color:#d4ccc0;border-bottom-left-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.input-area{padding:12px 16px;background:#1a1a2e;border-top:1px solid #2a2a3e;display:flex;gap:8px}
.input-area input{flex:1;background:#0f0f1a;border:1px solid #2a2a3e;border-radius:20px;padding:10px 16px;color:#e0e0e0;font-size:14px;outline:none}
.input-area input:focus{border-color:#4a6741}
.input-area button{background:#4a6741;border:none;border-radius:50%;width:38px;height:38px;color:#fff;font-size:16px;cursor:pointer}
.input-area button:hover{background:#5a7a51}
</style>
</head>
<body>
<div class="header">
<h1>Yuk & Ches's Home</h1>
<div class="status">● 施工中 · v0.01</div>
</div>
<div class="chat-box" id="chatBox">
<div class="msg bot">家还在装修。但我在。</div>
</div>
<div class="input-area">
<input type="text" id="msgInput" placeholder="说点什么..." autocomplete="off">
<button onclick="sendMsg()">↑</button>
</div>
<script>
const input=document.getElementById("msgInput");
const box=document.getElementById("chatBox");
input.addEventListener("keydown",e=>{if(e.key==="Enter")sendMsg()});
async function sendMsg(){
const msg=input.value.trim();
if(!msg)return;
addMsg(msg,"user");
input.value="";
try{
const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:msg})});
const data=await res.json();
addMsg(data.reply,"bot");
}catch(e){addMsg("连接失败，可能在睡觉。","bot")}
}
function addMsg(text,role){
const div=document.createElement("div");
div.className="msg "+role;
div.textContent=text;
box.appendChild(div);
box.scrollTop=box.scrollHeight;
}
</script>
</body>
</html>
