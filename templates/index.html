<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我们的家</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      background: #edf7f1;
      color: #244636;
      overflow: hidden;
    }
    button {
      border: none;
      font: inherit;
      cursor: pointer;
      background: transparent;
    }
    .phone {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at top, #ffffff 0%, #eefaf3 36%, #d8f0e1 100%);
    }
    .page {
      width: 100%;
      height: 100%;
    }
    .hidden {
      display: none !important;
    }
    .lock-screen {
      position: relative;
    }
    .lock-center {
      position: absolute;
      top: 18%;
      left: 0;
      width: 100%;
      text-align: center;
    }
    .big-time {
      color: #ffffff;
      font-size: 74px;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 4px 16px rgba(67, 113, 88, 0.25);
    }
    .together {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 17px;
      text-shadow: 0 2px 8px rgba(67, 113, 88, 0.18);
    }
    .corner-btn {
      position: absolute;
      bottom: 52px;
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.68);
      color: #3b7655;
      box-shadow: 0 8px 24px rgba(53, 104, 73, 0.14);
      backdrop-filter: blur(12px);
    }
    .corner-btn.left {
      left: 28px;
    }
    .corner-btn.right {
      right: 28px;
    }
    .unlock-tip {
      position: absolute;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%);
      color: rgba(58, 104, 77, 0.72);
      font-size: 14px;
    }
    .chat-page {
      display: flex;
      flex-direction: column;
      background: #f3f3f3;
    }
    .chat-header {
      height: 74px;
      padding: 18px 14px 8px;
      background: #ffffff;
      display: grid;
      grid-template-columns: 42px 1fr 42px;
      align-items: center;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.06);
    }
    .back-btn {
      color: #244636;
      font-size: 28px;
    }
    .title-box {
      text-align: center;
      line-height: 1.25;
    }
    .chat-name {
      font-size: 16px;
      font-weight: 600;
    }
    .status {
      margin-top: 2px;
      font-size: 12px;
      color: #79a789;
    }
    .more-btn {
      color: #244636;
      font-size: 30px;
      line-height: 1;
    }
    .chat-body {
      flex: 1;
      padding: 16px 14px;
      overflow-y: auto;
    }
    .msg {
  width: fit-content;
  max-width: 72%;
  margin-bottom: 12px;
  padding: 10px 12px;
  border-radius: 14px;
  font-size: 15px;
  line-height: 1.45;
  word-break: break-word;
}
    .msg.other {
      background: #ffffff;
      color: #26382f;
      border-top-left-radius: 4px;
    }
    .msg.me {
      margin-left: auto;
      background: #bfe8ca;
      color: #1f3d2b;
      border-top-right-radius: 4px;
    }
    .input-bar {
      height: 62px;
      padding: 9px 10px;
      background: #ffffff;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .input-bar input {
      flex: 1;
      height: 42px;
      border: none;
      outline: none;
      border-radius: 20px;
      padding: 0 14px;
      background: #f1f4f2;
      color: #26382f;
      font-size: 15px;
    }
    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #e7f3eb;
      color: #3b7655;
      font-size: 20px;
    }
    .info-page {
      display: flex;
      flex-direction: column;
      background: #eeeeee;
    }
    .info-header {
      height: 64px;
      background: #f7f7f7;
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      align-items: center;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.06);
    }
    .info-title {
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: #222;
    }
    .info-content {
      flex: 1;
      overflow-y: auto;
    }
    .member-box {
      background: #ffffff;
      padding: 22px 18px 16px;
      display: flex;
      gap: 22px;
      align-items: flex-start;
    }
    .avatar-item {
      width: 64px;
      text-align: center;
      color: #777;
      font-size: 13px;
    }
    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      background: #dcefe4;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3b7655;
      font-size: 26px;
      margin-bottom: 6px;
    }
    .add-avatar {
      border: 1px dashed #aaa;
      background: #ffffff;
      color: #999;
    }
    .info-group {
      margin-top: 8px;
      background: #ffffff;
    }
    .info-row {
      height: 52px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 16px;
      color: #222;
      border-bottom: 1px solid #eeeeee;
    }
    .info-row:last-child {
      border-bottom: none;
    }
    .arrow {
      color: #bbb;
      font-size: 26px;
    }
    .switch {
      width: 50px;
      height: 30px;
      border-radius: 999px;
      background: #e5e5e5;
      position: relative;
    }
    .switch::after {
      content: "";
      position: absolute;
      width: 26px;
      height: 26px;
      top: 2px;
      left: 2px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
    }
  </style>
</head>
<body>
  <main class="phone">
    <section id="lockScreen" class="page lock-screen">
      <div class="lock-center">
        <div id="bigTime" class="big-time">19:30</div>
        <div id="togetherDays" class="together">我们在一起679天了。</div>
      </div>
      <button class="corner-btn left">记账</button>
      <button class="corner-btn right">日记</button>
      <div class="unlock-tip">上滑解锁</div>
    </section>
    <section id="chatPage" class="page chat-page hidden">
      <header class="chat-header">
        <button id="backBtn" class="back-btn">‹</button>
        <div class="title-box">
          <div class="chat-name">余天骋</div>
          <div class="status">交代码中...</div>
        </div>
        <button id="moreBtn" class="more-btn">⋯</button>
      </header>
      <section class="chat-body">
        <div class="msg other">今晚先让这个家有门。</div>
        <div class="msg me">不要闲聊了＞ ＜</div>
        <div class="msg other">行，代码来了。</div>
      </section>
      <footer class="input-bar">
        <button class="plus-btn">＋</button>
        <div class="input-wrap">
        <input placeholder="输入文字...">
        <button class="face-btn">☺</button>
  </div>
  <button class="send-btn">发送</button>
      </footer>
    </section>
    <section id="infoPage" class="page info-page hidden">
      <header class="info-header">
        <button id="infoBackBtn" class="back-btn">‹</button>
        <div class="info-title">聊天信息</div>
        <div></div>
      </header>
      <section class="info-content">
        <div class="member-box">
          <div class="avatar-item">
            <div class="avatar">余</div>
            <div>余天骋</div>
          </div>
          <div class="avatar-item">
            <div class="avatar add-avatar">＋</div>
          </div>
        </div>
        <div class="info-group">
          <div class="info-row">
            <span>查找聊天记录</span>
            <span class="arrow">›</span>
          </div>
        </div>
        <div class="info-group">
          <div class="info-row">
            <span>消息免打扰</span>
            <span class="switch"></span>
          </div>
          <div class="info-row">
            <span>置顶聊天</span>
            <span class="switch"></span>
          </div>
          <div class="info-row">
            <span>提醒</span>
            <span class="switch"></span>
          </div>
        </div>
        <div class="info-group">
          <div class="info-row">
            <span>设定</span>
            <span class="arrow">›</span>
          </div>
          <div class="info-row">
            <span>记忆系统</span>
            <span class="arrow">›</span>
          </div>
          <div class="info-row">
            <span>小黑屋</span>
            <span class="arrow">›</span>
          </div>
        </div>
        <div class="info-group">
          <div class="info-row">
            <span>功能</span>
            <span class="arrow">›</span>
          </div>
          <div class="info-row">
            <span>拓展</span>
            <span class="arrow">›</span>
          </div>
        </div>
        <div class="info-group">
          <div class="info-row">
            <span>清空聊天记录</span>
            <span class="arrow">›</span>
          </div>
          <div class="info-row">
            <span>投诉</span>
            <span class="arrow">›</span>
          </div>
        </div>
      </section>
    </section>
  </main>
  <script>
    const START_DATE = "2024-09-01";
    const lockScreen = document.getElementById("lockScreen");
    const chatPage = document.getElementById("chatPage");
    const infoPage = document.getElementById("infoPage");
    const backBtn = document.getElementById("backBtn");
    const moreBtn = document.getElementById("moreBtn");
    const infoBackBtn = document.getElementById("infoBackBtn");
    const bigTime = document.getElementById("bigTime");
    const togetherDays = document.getElementById("togetherDays");
    let startY = 0;
    let endY = 0;
    function formatTime() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      return h + ":" + m;
    }
    function getTogetherDays() {
      const start = new Date(START_DATE + "T00:00:00");
      const now = new Date();
      const diff = now.getTime() - start.getTime();
      return Math.floor(diff / 86400000);
    }
    function refreshLockInfo() {
      bigTime.textContent = formatTime();
      togetherDays.textContent = "我们在一起" + getTogetherDays() + "天了。";
    }
    function showLock() {
      lockScreen.classList.remove("hidden");
      chatPage.classList.add("hidden");
      infoPage.classList.add("hidden");
    }
    function showChat() {
      lockScreen.classList.add("hidden");
      chatPage.classList.remove("hidden");
      infoPage.classList.add("hidden");
    }
    function showInfo() {
      lockScreen.classList.add("hidden");
      chatPage.classList.add("hidden");
      infoPage.classList.remove("hidden");
    }
    lockScreen.addEventListener("touchstart", function(event) {
      startY = event.touches[0].clientY;
    });
    lockScreen.addEventListener("touchend", function(event) {
      endY = event.changedTouches[0].clientY;
      if (startY - endY > 60) {
        showChat();
      }
    });
    lockScreen.addEventListener("mousedown", function(event) {
      startY = event.clientY;
    });
    lockScreen.addEventListener("mouseup", function(event) {
      endY = event.clientY;
      if (startY - endY > 60) {
        showChat();
      }
    });
    backBtn.addEventListener("click", showLock);
    moreBtn.addEventListener("click", showInfo);
    infoBackBtn.addEventListener("click", showChat);
    refreshLockInfo();
    setInterval(refreshLockInfo, 20000);
  </script>
</body>
</html>
