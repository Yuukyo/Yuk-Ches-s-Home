<!DOCTYPE html>
<html lang=zh-CN>
<head>
  <meta charset=UTF-8>
  <meta name=viewport content=width=device-width,initial-scale=1.0,viewport-fit=cover>
  <title>我们的家</title>
  <style>
    * {
      box-sizing: border-box;
    }
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif;
      background: #dfeee6;
      color: #244636;
      overflow: hidden;
    }
    button {
      border: none;
      outline: none;
      font: inherit;
      cursor: pointer;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
    }
    input {
      font: inherit;
    }
    .app-shell {
      width: 100vw;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, #ffffff 0%, #eefaf3 34%, #d8f0e1 100%);
    }
    .phone {
      width: min(100vw, 430px);
      height: min(100dvh, 920px);
      position: relative;
      overflow: hidden;
      background: #f3f3f3;
      box-shadow: 0 24px 80px rgba(42, 88, 59, 0.25);
    }
    .page {
      width: 100%;
      height: 100%;
    }
    .hidden {
      display: none !important;
    }
    .lock-screen {
      position: relative;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.96) 0%, rgba(239,250,243,0.96) 35%, rgba(210,239,223,0.98) 100%);
    }
    .lock-center {
      position: absolute;
      top: 18%;
      left: 0;
      width: 100%;
      text-align: center;
      user-select: none;
    }
    .big-time {
      color: #ffffff;
      font-size: clamp(58px, 18vw, 78px);
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 4px 18px rgba(67, 113, 88, 0.24);
    }
    .together {
      margin-top: 8px;
      color: rgba(255,255,255,0.92);
      font-size: 17px;
      text-shadow: 0 2px 8px rgba(67, 113, 88, 0.2);
    }
    .corner-btn {
      position: absolute;
      bottom: calc(52px + env(safe-area-inset-bottom));
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: rgba(255,255,255,0.7);
      color: #3b7655;
      box-shadow: 0 8px 24px rgba(53,104,73,0.14);
      backdrop-filter: blur(12px);
    }
    .corner-btn.left {
      left: 28px;
    }
    .corner-btn.right {
      right: 28px;
    }
    .unlock-tip {
      position: absolute;
      left: 50%;
      bottom: calc(34px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      color: rgba(58,104,77,0.72);
      font-size: 14px;
      user-select: none;
    }
    .chat-page {
      display: flex;
      flex-direction: column;
      background: #f3f3f3;
    }
    .chat-header {
      height: 74px;
      padding: 18px 12px 8px;
      background: #ffffff;
      display: grid;
      grid-template-columns: 42px 1fr 42px;
      align-items: center;
      box-shadow: 0 1px 0 rgba(0,0,0,0.06);
      flex-shrink: 0;
    }
    .back-btn {
      color: #244636;
      font-size: 32px;
      line-height: 1;
    }
    .title-box {
      text-align: center;
      line-height: 1.25;
      min-width: 0;
    }
    .chat-name {
      font-size: 16px;
      font-weight: 600;
      color: #244636;
    }
    .status {
      margin-top: 2px;
      font-size: 12px;
      color: #79a789;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .more-btn {
      color: #244636;
      font-size: 30px;
      line-height: 1;
      transform: translateY(-4px);
    }
    .chat-body {
      flex: 1;
      min-height: 0;
      padding: 16px 14px;
      overflow-y: auto;
      background: #f3f3f3;
    }
    .msg {
      width: fit-content;
      max-width: 72%;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .msg.other {
      background: #ffffff;
      color: #26382f;
      border-top-left-radius: 4px;
    }
    .msg.me {
      margin-left: auto;
      background: #bfe8ca;
      color: #1f3d2b;
      border-top-right-radius: 4px;
    }
    .input-bar {
      min-height: 66px;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: #ffffff;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    .plus-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #f0f0f0;
      color: #111;
      font-size: 34px;
      line-height: 1;
      flex-shrink: 0;
    }
    .input-wrap {
      flex: 1;
      min-width: 0;
      height: 46px;
      border-radius: 24px;
      background: #eeeeee;
      display: flex;
      align-items: center;
      padding: 0 8px 0 16px;
    }
    .input-wrap input {
      flex: 1;
      min-width: 0;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #26382f;
      font-size: 15px;
    }
    .face-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: #111;
      font-size: 28px;
      line-height: 1;
      flex-shrink: 0;
    }
    .send-btn {
      height: 44px;
      padding: 0 18px;
      border-radius: 22px;
      background: #20c76a;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .info-page {
      display: flex;
      flex-direction: column;
      background: #eeeeee;
    }
    .info-header {
      height: 64px;
      background: #f7f7f7;
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      align-items: center;
      box-shadow: 0 1px 0 rgba(0,0,0,0.06);
      flex-shrink: 0;
    }
    .info-title {
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      color: #222;
    }
    .info-content {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .member-box {
      background: #ffffff;
      padding: 22px 18px 16px;
      display: flex;
      gap: 22px;
      align-items: flex-start;
    }
    .avatar-item {
      width: 64px;
      text-align: center;
      color: #777;
      font-size: 13px;
    }
    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      background: #dcefe4;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3b7655;
      font-size: 26px;
      margin: 0 auto 6px;
    }
    .add-avatar {
      border: 1px dashed #aaa;
      background: #ffffff;
      color: #999;
    }
    .info-group {
      margin-top: 8px;
      background: #ffffff;
    }
    .info-row {
      min-height: 52px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 16px;
      color: #222;
      border-bottom: 1px solid #eeeeee;
    }
    .info-row:last-child {
      border-bottom: none;
    }
    .row-sub {
      color: #999;
      font-size: 13px;
      margin-top: 3px;
    }
    .row-main {
      padding: 10px 0;
    }
    .arrow {
      color: #bbb;
      font-size: 26px;
      flex-shrink: 0;
    }
    @media (max-width: 520px) {
      .app-shell {
        display: block;
      }
      .phone {
        width: 100vw;
        height: 100dvh;
        box-shadow: none;
      }
    }
    @media (min-width: 521px) {
      .phone {
        border-radius: 28px;
      }
    }
  </style>
</head>
<body>
  <div class=app-shell>
    <main class=phone>
      <section id=lockScreen class=page lock-screen>
        <div class=lock-center>
          <div id=bigTime class=big-time>20:01</div>
          <div id=togetherDays class=together>我们在一起679天了。</div>
        </div>
        <button class='corner-btn left'>记账</button>
        <button class='corner-btn right'>日记</button>
        <div class=unlock-tip>上滑解锁</div>
      </section>
      <section id=chatPage class='page chat-page hidden'>
        <header class=chat-header>
          <button id=backBtn class=back-btn>‹</button>
          <div class=title-box>
            <div class=chat-name>余天骋</div>
            <div class=status>改自适应中...</div>
          </div>
          <button id=moreBtn class=more-btn>⋯</button>
        </header>
        <section class=chat-body id=chatBody>
          <div class='msg other'>今晚先让这个家有门。</div>
          <div class='msg me'>不要闲聊了＞ ＜</div>
          <div class='msg other'>行，代码来了。</div>
        </section>
        <footer class=input-bar>
          <button class=plus-btn>＋</button>
          <div class=input-wrap>
            <input id=messageInput placeholder=输入文字...>
            <button class=face-btn>☺</button>
          </div>
          <button id=sendBtn class=send-btn>发送</button>
        </footer>
      </section>
      <section id=infoPage class='page info-page hidden'>
        <header class=info-header>
          <button id=infoBackBtn class=back-btn>‹</button>
          <div class=info-title>聊天信息</div>
          <div></div>
        </header>
        <section class=info-content>
          <div class=member-box>
            <div class=avatar-item>
              <div class=avatar>余</div>
              <div>余天骋</div>
            </div>
            <div class=avatar-item>
              <div class='avatar add-avatar'>＋</div>
            </div>
          </div>
          <div class=info-group>
            <div class=info-row>
              <div>查找聊天记录</div>
              <div class=arrow>›</div>
            </div>
          </div>
          <div class=info-group>
            <div class=info-row>
              <div class=row-main>
                <div>某人设定</div>
                <div class=row-sub>角色卡、状态、说话习惯</div>
              </div>
              <div class=arrow>›</div>
            </div>
            <div class=info-row>
              <div class=row-main>
                <div>世界书</div>
                <div class=row-sub>规则、关系、世界结构</div>
              </div>
              <div class=arrow>›</div>
            </div>
            <div class=info-row>
              <div class=row-main>
                <div>过往记忆</div>
                <div class=row-sub>搬家前聊天、小剧场、旧记录</div>
              </div>
              <div class=arrow>›</div>
            </div>
          </div>
          <div class=info-group>
            <div class=info-row>
              <div>记忆系统</div>
              <div class=arrow>›</div>
            </div>
            <div class=info-row>
              <div>缓存命中</div>
              <div class=arrow>›</div>
            </div>
            <div class=info-row>
              <div>收藏消息</div>
              <div class=arrow>›</div>
            </div>
            <div class=info-row>
              <div>NAI生图</div>
              <div class=arrow>›</div>
            </div>
            <div class=info-row>
              <div>小剧场</div>
              <div class=arrow>›</div>
            </div>
          </div>
          <div class=info-group>
            <div class=info-row>
              <div>一起听歌</div>
              <div class=arrow>›</div>
            </div>
            <div class=info-row>
              <div>一起看书</div>
              <div class=arrow>›</div>
            </div>
            <div class=info-row>
              <div>日历</div>
              <div class=arrow>›</div>
            </div>
            <div class=info-row>
              <div>手机权限</div>
              <div class=arrow>›</div>
            </div>
            <div class=info-row>
              <div>使用情况</div>
              <div class=arrow>›</div>
            </div>
          </div>
          <div class=info-group>
            <div class=info-row>
              <div>投诉</div>
              <div class=arrow>›</div>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>
  <script>
    const START_DATE = `2024-09-01`
    const lockScreen = document.getElementById(`lockScreen`)
    const chatPage = document.getElementById(`chatPage`)
    const infoPage = document.getElementById(`infoPage`)
    const backBtn = document.getElementById(`backBtn`)
    const moreBtn = document.getElementById(`moreBtn`)
    const infoBackBtn = document.getElementById(`infoBackBtn`)
    const bigTime = document.getElementById(`bigTime`)
    const togetherDays = document.getElementById(`togetherDays`)
    const sendBtn = document.getElementById(`sendBtn`)
    const messageInput = document.getElementById(`messageInput`)
    const chatBody = document.getElementById(`chatBody`)
    let startY = 0
    let endY = 0
    function formatTime() {
      const now = new Date()
      const h = String(now.getHours()).padStart(2, `0`)
      const m = String(now.getMinutes()).padStart(2, `0`)
      return h + `:` + m
    }
    function getTogetherDays() {
      const start = new Date(START_DATE + `T00:00:00`)
      const now = new Date()
      const diff = now.getTime() - start.getTime()
      return Math.floor(diff / 86400000)
    }
    function refreshLockInfo() {
      bigTime.textContent = formatTime()
      togetherDays.textContent = `我们在一起` + getTogetherDays() + `天了。`
    }
    function showLock() {
      lockScreen.classList.remove(`hidden`)
      chatPage.classList.add(`hidden`)
      infoPage.classList.add(`hidden`)
    }
    function showChat() {
      lockScreen.classList.add(`hidden`)
      chatPage.classList.remove(`hidden`)
      infoPage.classList.add(`hidden`)
    }
    function showInfo() {
      lockScreen.classList.add(`hidden`)
      chatPage.classList.add(`hidden`)
      infoPage.classList.remove(`hidden`)
    }
    function sendMessage() {
      const text = messageInput.value.trim()
      if (!text) return
      const msg = document.createElement(`div`)
      msg.className = `msg me`
      msg.textContent = text
      chatBody.appendChild(msg)
      messageInput.value = ``
      chatBody.scrollTop = chatBody.scrollHeight
    }
    lockScreen.addEventListener(`touchstart`, function(event) {
      startY = event.touches[0].clientY
    })
    lockScreen.addEventListener(`touchend`, function(event) {
      endY = event.changedTouches[0].clientY
      if (startY - endY > 60) {
        showChat()
      }
    })
    lockScreen.addEventListener(`mousedown`, function(event) {
      startY = event.clientY
    })
    lockScreen.addEventListener(`mouseup`, function(event) {
      endY = event.clientY
      if (startY - endY > 60) {
        showChat()
      }
    })
    backBtn.addEventListener(`click`, showLock)
    moreBtn.addEventListener(`click`, showInfo)
    infoBackBtn.addEventListener(`click`, showChat)
    sendBtn.addEventListener(`click`, sendMessage)
    messageInput.addEventListener(`keydown`, function(event) {
      if (event.key === `Enter`) {
        sendMessage()
      }
    })
    refreshLockInfo()
    setInterval(refreshLockInfo, 20000)
  </script>
</body>
</html>
